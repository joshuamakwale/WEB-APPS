<body>
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
    display: flex;
    height: 100vh;
  }
  
  .top-bar {
    background-color: #4CAF50;
    color: white;
    padding: 10px 20px;
    display: flex;
    align-items: center;
  }
  
  .icon {
    width: 30px;
    height: 30px;
    margin-right: 10px;
  }
  
 

  .menu-item {
    padding: 15px;
    cursor: pointer;
  }
  
  .menu-item:hover {
    background-color: #ddd;
  }
  
  .main-content {
    flex-grow: 1;
    padding: 20px;
  }
  
  .input-section {
    display: flex;
    margin-bottom: 20px;
  }
  
  #task-input {
    flex-grow: 1;
    padding: 10px;
    font-size: 16px;
  }
  a{
    padding: 10px 20px;
    font-size: 16px;
    background-color: #4CAF50;
    color: white;
    text-decoration: none;
    border-radius: 5px;
      transition: background-color 0.3s ease, border-radius 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
  }
  a:hover {
    background-color: #45a049;
    border-radius: 8px;
    border-color: #45a049;
    box-shadow: 0 4px 8px  rgb(116, 116, 219);

    
  }
  #add-task-btn {
    padding: 10px 20px;
    font-size: 16px;
    background-color: #4CAF50;
    color: white;
    border: none;
    cursor: pointer;
    border-radius: 5px;
      transition: background-color 0.3s ease, border-radius 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
      
  }
  
  #add-task-btn:hover {
    background-color: #45a049;
    border-radius: 8px;
    border-color: #45a049;
    box-shadow: 0 4px 8px  rgb(116, 116, 219);
    
  }
  input[type="date"], input[type="time"], input[type="text"] {
    border: 2px solid #ccc;
    border-radius: 4px;
    padding: 10px;
    font-size: 16px;
    transition: border-color 0.3s ease, box-shadow 0.3s ease;
    border-color: #5ae2c0;
    box-shadow: 0 8px 8px rgba(90, 226, 192, 0.2);
  }

footer{
  background-color: #4CAF50;
  color: white;
  text-align: center;
  padding: 10px 0;
  position: fixed;
  width: 100%;
  bottom: 0;
  
}
/* TASK CARD */
.task-card{
  background: white;
  padding: 15px;
  margin-top: 15px;
  border-radius: 10px;
  border-left: 5px solid #4CAF50;
  box-shadow: 0 10px 20px rgba(0,0,0,0.1);
  animation: slideIn 0.6s ease forwards;
  transform: translateX(-50px);
  opacity: 0;
}

/* ADD ANIMATION */
@keyframes slideIn{
  to{
    transform: translateX(0);
    opacity: 1;
  }
}

/* DELETE ANIMATION */
@keyframes explodeOut{
  0%{
    transform: scale(1);
    opacity:1;
  }
  50%{
    transform: scale(1.2) rotate(5deg);
  }
  100%{
    transform: scale(0);
    opacity:0;
  }
}

.delete-animation{
  animation: explodeOut 0.4s forwards;
}

/* BUTTON PRESS EFFECT */
#add-task-btn:active{
  transform: scale(0.9);
}

/* INPUT FOCUS EFFECT */
input:focus{
  outline:none;
  transform: scale(1.03);
  box-shadow:0 0 15px rgba(90,226,192,0.6);
}

/* TASK HOVER */
.task-card:hover{
  transform: translateY(-5px) scale(1.02);
  transition: 0.3s;
}
</style>
<div class="top-bar">
  <h1>To-Do List</h1>
</div>

<div class="main-content">

  <div class="input-section">
    <input type="text" id="task-input" placeholder="Enter a new task">

    <input type="date" id="date-input">
  </div>

  <input type="time" id="time-input">

  <button id="add-task-btn">Add Task</button>

</div>


<script>

const addBtn = document.getElementById("add-task-btn");
const taskInput = document.getElementById("task-input");
const dateInput = document.getElementById("date-input");
const timeInput = document.getElementById("time-input");

const taskContainer = document.createElement("div");
document.querySelector(".main-content").appendChild(taskContainer);

addBtn.addEventListener("click", addTask);

function addTask(){

    const task = taskInput.value;
    const date = dateInput.value;
    const time = timeInput.value;

    if(task === ""){
        alert("Enter a task first");
        return;
    }

    const taskCard = document.createElement("div");
    taskCard.classList.add("task-card");

    taskCard.innerHTML = `
        <h3>${task}</h3>
        <p>${date} | ${time}</p>
        <button class="delete">Delete</button>
    `;

    taskContainer.appendChild(taskCard);

    const deleteBtn = taskCard.querySelector(".delete");

    deleteBtn.addEventListener("click", function(){

        taskCard.classList.add("delete-animation");

        setTimeout(()=>{
            taskCard.remove();
        },400)

    });

    taskInput.value="";
    dateInput.value="";
    timeInput.value="";
}

</script>

</body>

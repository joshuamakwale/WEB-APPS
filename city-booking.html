<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>City Explorer & Book</title>

  <!-- Leaflet OSM (free open source map) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue-dark: #0d2b5e;
      --blue-mid:  #1a4ba8;
      --blue-accent: #2e6ef7;
      --sky: #4f9cf9;
      --white: #ffffff;
      --offwhite: #f4f7ff;
      --text-light: #d4e3ff;
      --find-btn: #2e6ef7;
      --book-btn: #ff6b35;
      --book-btn-hover: #e85a22;
      --shadow: 0 8px 32px rgba(13,43,94,0.18);
    }

    html, body {
      height: 100%;
      font-family: 'DM Sans', sans-serif;
      background: var(--offwhite);
    }

    /* ── HEADER / BLUE ZONE ── */
    .header {
      background: linear-gradient(135deg, var(--blue-dark) 0%, var(--blue-mid) 60%, var(--blue-accent) 100%);
      padding: 28px 32px 36px;
      position: relative;
      overflow: hidden;
      z-index: 10;
    }

    .header::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 80% 20%, rgba(79,156,249,0.25) 0%, transparent 60%),
        radial-gradient(ellipse at 10% 80%, rgba(46,110,247,0.20) 0%, transparent 55%);
      pointer-events: none;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 22px;
    }

    .brand-icon {
      width: 36px; height: 36px;
      background: rgba(255,255,255,0.15);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      backdrop-filter: blur(8px);
    }

    .brand-name {
      font-family: 'Syne', sans-serif;
      font-size: 20px;
      font-weight: 800;
      color: #fff;
      letter-spacing: -0.5px;
    }

    .brand-name span { color: var(--sky); }

    .header-tagline {
      font-family: 'Syne', sans-serif;
      font-size: 26px;
      font-weight: 700;
      color: #fff;
      line-height: 1.2;
      margin-bottom: 6px;
    }

    .header-sub {
      font-size: 13px;
      color: var(--text-light);
      margin-bottom: 22px;
      font-weight: 300;
    }

    /* ── SEARCH BAR ── */
    .search-row {
      display: flex;
      gap: 10px;
      position: relative;
    }

    .search-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      background: rgba(255,255,255,0.12);
      border: 1.5px solid rgba(255,255,255,0.28);
      border-radius: 14px;
      padding: 0 16px;
      gap: 10px;
      backdrop-filter: blur(10px);
      transition: border-color 0.2s, background 0.2s;
    }

    .search-wrap:focus-within {
      background: rgba(255,255,255,0.2);
      border-color: rgba(255,255,255,0.6);
    }

    .search-icon {
      font-size: 17px;
      color: var(--text-light);
      flex-shrink: 0;
    }

    .search-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      padding: 14px 0;
    }

    .search-input::placeholder { color: rgba(255,255,255,0.5); }

    .btn-find {
      background: var(--find-btn);
      color: #fff;
      border: none;
      border-radius: 14px;
      padding: 0 22px;
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      transition: transform 0.15s, box-shadow 0.15s, background 0.15s;
      box-shadow: 0 4px 18px rgba(46,110,247,0.4);
      letter-spacing: 0.3px;
    }

    .btn-find:hover {
      background: #1a5ce8;
      transform: translateY(-1px);
      box-shadow: 0 6px 24px rgba(46,110,247,0.55);
    }

    .btn-find:active { transform: translateY(0); }

    /* autocomplete suggestions */
    .suggestions {
      position: absolute;
      top: calc(100% + 8px);
      left: 0;
      right: 80px;
      background: #fff;
      border-radius: 14px;
      box-shadow: var(--shadow);
      overflow: hidden;
      z-index: 9999;
      display: none;
    }

    .suggestions.visible { display: block; }

    .suggestion-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      cursor: pointer;
      font-size: 14px;
      color: var(--blue-dark);
      transition: background 0.15s;
      border-bottom: 1px solid #f0f0f0;
    }

    .suggestion-item:last-child { border-bottom: none; }
    .suggestion-item:hover { background: var(--offwhite); }

    .suggestion-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--blue-accent);
      flex-shrink: 0;
    }

    /* ── RESULT CARD (hidden until search) ── */
    .result-card {
      margin: 0 32px;
      margin-top: -18px;
      background: #fff;
      border-radius: 18px;
      box-shadow: var(--shadow);
      padding: 18px 20px;
      display: none;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      z-index: 5;
      position: relative;
      border: 1.5px solid rgba(46,110,247,0.1);
    }

    .result-card.visible { display: flex; }

    .result-info { flex: 1; min-width: 0; }

    .result-city {
      font-family: 'Syne', sans-serif;
      font-size: 18px;
      font-weight: 700;
      color: var(--blue-dark);
      margin-bottom: 3px;
    }

    .result-coords {
      font-size: 12px;
      color: #8a9cc2;
      font-weight: 400;
    }

    .result-badge {
      background: #e8f0ff;
      color: var(--blue-accent);
      font-size: 11px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 20px;
      font-family: 'Syne', sans-serif;
    }

    .btn-book {
      background: var(--book-btn);
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 11px 22px;
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      transition: transform 0.15s, box-shadow 0.15s, background 0.15s;
      box-shadow: 0 4px 18px rgba(255,107,53,0.35);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .btn-book:hover {
      background: var(--book-btn-hover);
      transform: translateY(-1px);
      box-shadow: 0 6px 24px rgba(255,107,53,0.5);
    }

    /* ── MAP ── */
    .map-container {
      flex: 1;
      position: relative;
      margin: 20px 24px 24px;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(13,43,94,0.12);
      min-height: 380px;
    }

    #map {
      width: 100%; height: 100%;
      min-height: 380px;
      border-radius: 20px;
    }

    .map-overlay-hint {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      pointer-events: none;
      z-index: 999;
      opacity: 1;
      transition: opacity 0.4s;
    }

    .map-overlay-hint.hidden { opacity: 0; }

    .map-hint-icon {
      font-size: 44px;
      display: block;
      margin-bottom: 10px;
      filter: drop-shadow(0 2px 6px rgba(0,0,0,0.15));
    }

    .map-hint-text {
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 600;
      color: #8a9cc2;
      background: rgba(255,255,255,0.85);
      padding: 8px 18px;
      border-radius: 20px;
      backdrop-filter: blur(6px);
    }

    /* ── BOOKING MODAL ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(13,43,94,0.5);
      backdrop-filter: blur(4px);
      z-index: 10000;
      display: none;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.visible { display: flex; }

    .modal {
      background: #fff;
      border-radius: 24px;
      padding: 32px 28px 28px;
      width: 90%;
      max-width: 400px;
      box-shadow: 0 24px 60px rgba(13,43,94,0.25);
      animation: popIn 0.3s cubic-bezier(.34,1.56,.64,1);
    }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.85) translateY(20px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    .modal-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .modal-title {
      font-family: 'Syne', sans-serif;
      font-size: 22px;
      font-weight: 800;
      color: var(--blue-dark);
    }

    .modal-subtitle {
      font-size: 13px;
      color: #8a9cc2;
      margin-top: 3px;
    }

    .modal-close {
      background: #f0f4ff;
      border: none;
      border-radius: 8px;
      width: 32px; height: 32px;
      font-size: 16px;
      cursor: pointer;
      color: #8a9cc2;
      transition: background 0.15s;
    }

    .modal-close:hover { background: #e0e8ff; color: var(--blue-dark); }

    .form-row {
      margin-bottom: 14px;
    }

    .form-label {
      font-size: 12px;
      font-weight: 600;
      color: #8a9cc2;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      display: block;
      margin-bottom: 6px;
    }

    .form-input {
      width: 100%;
      border: 1.5px solid #e0e8ff;
      border-radius: 10px;
      padding: 11px 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      color: var(--blue-dark);
      outline: none;
      transition: border-color 0.2s;
    }

    .form-input:focus { border-color: var(--blue-accent); }

    .form-row-two { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .btn-confirm {
      width: 100%;
      background: linear-gradient(135deg, var(--blue-mid), var(--blue-accent));
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 14px;
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.2s, transform 0.15s;
      box-shadow: 0 4px 20px rgba(46,110,247,0.35);
    }

    .btn-confirm:hover { opacity: 0.9; transform: translateY(-1px); }

    /* ── STATUS TOAST ── */
    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--blue-dark);
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      padding: 12px 24px;
      border-radius: 30px;
      box-shadow: var(--shadow);
      z-index: 20000;
      transition: transform 0.35s cubic-bezier(.34,1.56,.64,1);
      white-space: nowrap;
    }

    .toast.show { transform: translateX(-50%) translateY(0); }

    /* ── LAYOUT SHELL ── */
    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    .loading-spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-right: 6px;
      vertical-align: middle;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="app">

  <!-- ── BLUE HEADER ── -->
  <div class="header">
    <div class="brand">
      <div class="brand-icon">🌍</div>
      <div class="brand-name">City<span>Scout</span></div>
    </div>

    <div class="header-tagline">Find your next<br>destination</div>
    <div class="header-sub">Search any city — see it on the map, then book instantly</div>

    <div class="search-row" id="searchRow">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input
          id="searchInput"
          class="search-input"
          type="text"
          placeholder="Search a city… e.g. Tokyo, Paris, New York"
          autocomplete="off"
        />
      </div>
      <button class="btn-find" id="findBtn">Find</button>

      <!-- Autocomplete dropdown -->
      <div class="suggestions" id="suggestions"></div>
    </div>
  </div>

  <!-- ── RESULT CARD ── -->
  <div class="result-card" id="resultCard">
    <div class="result-info">
      <div class="result-city" id="resultCity">—</div>
      <div class="result-coords" id="resultCoords">—</div>
    </div>
    <span class="result-badge">📍 Located</span>
    <button class="btn-book" id="bookBtn">
      🏨 Book Now
    </button>
  </div>

  <!-- ── MAP ── -->
  <div class="map-container">
    <div id="map"></div>
    <div class="map-overlay-hint" id="mapHint">
      <span class="map-hint-icon">🗺️</span>
      <span class="map-hint-text">Search a city above to explore it here</span>
    </div>
  </div>

</div>

<!-- ── BOOKING MODAL ── -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <div>
        <div class="modal-title" id="modalCity">Book in City</div>
        <div class="modal-subtitle">Fill in your travel details below</div>
      </div>
      <button class="modal-close" id="modalClose">✕</button>
    </div>

    <div class="form-row">
      <label class="form-label">Full Name</label>
      <input class="form-input" type="text" placeholder="Jane Doe" />
    </div>

    <div class="form-row">
      <label class="form-label">Email</label>
      <input class="form-input" type="email" placeholder="jane@example.com" />
    </div>

    <div class="form-row form-row-two">
      <div>
        <label class="form-label">Check-in</label>
        <input class="form-input" type="date" />
      </div>
      <div>
        <label class="form-label">Check-out</label>
        <input class="form-input" type="date" />
      </div>
    </div>

    <div class="form-row">
      <label class="form-label">Guests</label>
      <input class="form-input" type="number" placeholder="2" min="1" max="20" />
    </div>

    <button class="btn-confirm" id="confirmBtn">Confirm Booking ✓</button>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
  // ── MAP INIT ──
  const map = L.map('map', { zoomControl: true }).setView([20, 0], 2);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
    maxZoom: 19
  }).addTo(map);

  let marker = null;

  // Custom marker icon
  const pinIcon = L.divIcon({
    html: `<div style="
      width:36px;height:36px;
      background:linear-gradient(135deg,#1a4ba8,#2e6ef7);
      border-radius:50% 50% 50% 0;
      transform:rotate(-45deg);
      border:3px solid #fff;
      box-shadow:0 4px 14px rgba(46,110,247,0.45);
    "></div>`,
    className: '',
    iconSize: [36, 36],
    iconAnchor: [18, 36],
    popupAnchor: [0, -38]
  });

  // ── GEOCODE via Nominatim (free OSM) ──
  async function geocode(city) {
    const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(city)}&format=json&limit=5`;
    const res = await fetch(url, { headers: { 'Accept-Language': 'en' } });
    return res.json();
  }

  // ── UI REFS ──
  const searchInput  = document.getElementById('searchInput');
  const findBtn      = document.getElementById('findBtn');
  const suggestions  = document.getElementById('suggestions');
  const resultCard   = document.getElementById('resultCard');
  const resultCity   = document.getElementById('resultCity');
  const resultCoords = document.getElementById('resultCoords');
  const bookBtn      = document.getElementById('bookBtn');
  const mapHint      = document.getElementById('mapHint');
  const modalOverlay = document.getElementById('modalOverlay');
  const modalClose   = document.getElementById('modalClose');
  const modalCity    = document.getElementById('modalCity');
  const confirmBtn   = document.getElementById('confirmBtn');
  const toast        = document.getElementById('toast');

  let debounceTimer;
  let currentCity = '';

  // ── DEBOUNCED AUTOCOMPLETE ──
  searchInput.addEventListener('input', () => {
    clearTimeout(debounceTimer);
    const q = searchInput.value.trim();
    if (q.length < 2) { suggestions.classList.remove('visible'); return; }

    debounceTimer = setTimeout(async () => {
      const results = await geocode(q);
      renderSuggestions(results);
    }, 350);
  });

  function renderSuggestions(results) {
    if (!results.length) { suggestions.classList.remove('visible'); return; }
    suggestions.innerHTML = results.map(r => `
      <div class="suggestion-item" data-lat="${r.lat}" data-lon="${r.lon}" data-name="${r.display_name.split(',')[0]}">
        <span class="suggestion-dot"></span>
        ${r.display_name.split(',').slice(0,3).join(', ')}
      </div>`).join('');
    suggestions.classList.add('visible');

    suggestions.querySelectorAll('.suggestion-item').forEach(el => {
      el.addEventListener('click', () => {
        const lat  = parseFloat(el.dataset.lat);
        const lon  = parseFloat(el.dataset.lon);
        const name = el.dataset.name;
        searchInput.value = el.textContent.trim();
        suggestions.classList.remove('visible');
        showLocation(name, lat, lon);
      });
    });
  }

  // Hide suggestions on outside click
  document.addEventListener('click', e => {
    if (!document.getElementById('searchRow').contains(e.target)) {
      suggestions.classList.remove('visible');
    }
  });

  // ── FIND BUTTON ──
  findBtn.addEventListener('click', doFind);
  searchInput.addEventListener('keydown', e => { if (e.key === 'Enter') doFind(); });

  async function doFind() {
    const q = searchInput.value.trim();
    if (!q) return;
    findBtn.innerHTML = '<span class="loading-spinner"></span> Finding…';
    findBtn.disabled = true;
    suggestions.classList.remove('visible');

    try {
      const results = await geocode(q);
      if (!results.length) { showToast('❌ City not found. Try another name.'); return; }
      const r = results[0];
      const name = r.display_name.split(',')[0];
      showLocation(name, parseFloat(r.lat), parseFloat(r.lon));
    } catch(e) {
      showToast('⚠️ Network error. Please try again.');
    } finally {
      findBtn.textContent = 'Find';
      findBtn.disabled = false;
    }
  }

  function showLocation(name, lat, lon) {
    currentCity = name;

    // Remove old marker
    if (marker) map.removeLayer(marker);

    // Add new marker
    marker = L.marker([lat, lon], { icon: pinIcon })
      .addTo(map)
      .bindPopup(`<b style="font-family:Syne,sans-serif;color:#0d2b5e">${name}</b><br><small>${lat.toFixed(4)}, ${lon.toFixed(4)}</small>`)
      .openPopup();

    map.flyTo([lat, lon], 12, { duration: 1.4 });

    // Hide hint
    mapHint.classList.add('hidden');

    // Show result card
    resultCity.textContent = name;
    resultCoords.textContent = `${lat.toFixed(5)}°, ${lon.toFixed(5)}°`;
    resultCard.classList.add('visible');

    showToast(`📍 Located: ${name}`);
  }

  // ── BOOK BUTTON ──
  bookBtn.addEventListener('click', () => {
    modalCity.textContent = `Book in ${currentCity}`;
    modalOverlay.classList.add('visible');
  });

  modalClose.addEventListener('click', () => modalOverlay.classList.remove('visible'));
  modalOverlay.addEventListener('click', e => {
    if (e.target === modalOverlay) modalOverlay.classList.remove('visible');
  });

  confirmBtn.addEventListener('click', () => {
    modalOverlay.classList.remove('visible');
    showToast(`🎉 Booking confirmed for ${currentCity}!`);
  });

  // ── TOAST ──
  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 3000);
  }
</script>
</body>
</html>
